global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bridge-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'bridge-backend'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.*):.*'
        replacement: '${1}'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'influxdb'
    scrape_interval: 30s
    static_configs:
      - targets: ['influxdb:8086']
    metrics_path: '/metrics'
    params:
      collect[]:
        - 'database'
        - 'httpd'
        - 'write'
        - 'query'
        - 'runtime'

  - job_name: 'mqtt-broker'
    scrape_interval: 30s
    static_configs:
      - targets: ['mqtt-broker:9001']
    metrics_path: '/metrics'
