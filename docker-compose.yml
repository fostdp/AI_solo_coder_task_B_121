version: '3.8'

x-common-env: &common-env
  TZ: Asia/Shanghai
  INFLUXDB_URL: http://influxdb:8086
  INFLUXDB_DB: bridge_monitoring
  INFLUXDB_USER: admin
  INFLUXDB_PASS: admin123
  MQTT_HOST: mqtt-broker
  MQTT_PORT: 1883
  MQTT_ENABLED: "true"
  CONFIG_DIR: /app/config
  RUST_LOG: info,bridge_monitoring_backend=debug

services:
  influxdb:
    image: influxdb:1.8.10-alpine
    container_name: bridge-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      <<: *common-env
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin123
      INFLUXDB_DB: bridge_monitoring
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
    volumes:
      - influxdb-data:/var/lib/influxdb
      - ./scripts/init_influxdb.iql:/docker-entrypoint-initdb.d/init.iql:ro
      - ./scripts/influxdb.conf:/etc/influxdb/influxdb.conf:ro
    command: -config /etc/influxdb/influxdb.conf
    healthcheck:
      test: ["CMD", "influx", "-ping", "-host", "localhost", "-port", "8086"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mqtt-broker:
    image: eclipse-mosquitto:2.0.18
    container_name: bridge-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./scripts/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bridge-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      influxdb:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    environment:
      <<: *common-env
      HOST: 0.0.0.0
      PORT: 8080
      CHANNEL_BUFFER: 200
    volumes:
      - ./config:/app/config:ro
      - ./frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  simulator:
    build:
      context: .
      dockerfile: scripts/Dockerfile.simulator
    container_name: bridge-simulator
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      <<: *common-env
      API_HOST: backend
      API_PORT: 8080
      SIM_INTERVAL: 60
    command: ["--interactive"]
    stdin_open: true
    tty: true
    volumes:
      - ./scripts:/app/scripts:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: bridge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bridge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:11.1.0
    container_name: bridge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  influxdb-data:
  mosquitto-data:
  mosquitto-log:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: bridge-monitoring-net
    driver: bridge
